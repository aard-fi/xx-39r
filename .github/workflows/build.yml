name: Build Firmware Variants

# we're intentionally not using matrix builds here - we can build all variants
# with the makefile for easy local testing, so we're just using that. Drawback
# is that it is sequential, but the firmware is small enough that it doesn't
# matter much.
on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # avr-libc in the default ubuntu runners is ancient, and doesn't know
      # about the attiny414
      - name: Install modm-io toolchain
        run: |
          wget -O- https://github.com/modm-io/avr-gcc/releases/download/v15.2.0/modm-avr-gcc.tar.bz2 | sudo tar xj -C /opt
          echo "/opt/avr-gcc/bin" >> $GITHUB_PATH

      - name: Build all variants
        run: |
          make

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: firmware-all
          path: firmware/build/*.hex

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: firmware-all
          path: .

      - name: Package release ZIP
        run: |
          mkdir -p "xx-39r-${{ github.ref_name }}/firmware"
          cp firmware/build/*.hex "xx-39r-${{ github.ref_name }}/firmware/"
          cp -r scripts "xx-39r-${{ github.ref_name }}/"
          cp RELEASE_NOTES.md "xx-39r-${{ github.ref_name }}/"
          zip -r "xx-39r-${{ github.ref_name }}.zip" "xx-39r-${{ github.ref_name }}"

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "xx-39r-${{ github.ref_name }}.zip" \
            --generate-notes
